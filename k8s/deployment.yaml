apiVersion: apps/v1

kind: Deployment

metadata:
  name: myportfolio
  labels:
    app: myportfolio
    environment: production

spec:

  replicas: 2

  selector:
    matchLabels:
      app: myportfolio

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: myportfolio
    spec:
      containers:
        - name: myportfolio
          image: raina1994/myportfolio:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8085
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10

